<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="canonical" href="https://novararts.com.ar/contacto.html">

  <!-- FAVICON -->
  <link rel="icon" href="/favicon.ico" sizes="any">

  <!-- Open Graph -->
  <meta name="description" content="Contacto con el creador de NovarArts.">
  <meta property="og:title" content="Contacto | NovarArts">
  <meta property="og:description" content="Contacto">
  <meta property="og:image" content="https://novararts.com.ar/images/Logo.png">
  <meta property="og:url" content="https://novararts.com.ar/contacto.html">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contacto | NovarArts">
  <meta name="twitter:description" content="Contacto">
  <meta name="twitter:image" content="https://novararts.com.ar/images/Logo.png">

  <title>Contacto | NovarArts</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Header -->
  <header>
    <a href="/index.html" class="logo"><span class="logo-full">Novar<span class="accent">Arts</span></span><span class="logo-short">N<span class="accent">A</span></span></a>

    <nav class="nav">
      <ul>
        <li><a href="/index.html">Inicio</a></li>
        <li><a href="/articulos.html">Artículos</a></li>
        <li><a href="/proyectos.html">Proyectos</a></li>
        <li><a href="/contacto.html">Contacto</a></li>
      </ul>
    </nav>

    <button class="hamburger" aria-label="Menu">☰</button>
  </header>

  <!-- Contacto -->
  <main class="contacto">
    <section class="contacto-contenido">
      <h2 class="titulo-principal">Contacto</h2>
      <p>¿Querés ponerte en contacto conmigo? Escribime y te responderé a la brevedad.</p>

      <form id="contact-form" action="https://formspree.io/f/xrbonrak" method="POST" class="form-contacto">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="name" required>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required>

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="message" rows="5" required></textarea>

        <button class="boton-contacto" type="submit">Enviar mensaje</button>
      </form>
      <p id="form-status" class="form-status"></p>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-about">
      <p>© 2025 <strong>NovarArts</strong> — Creado por Santiago Novara. Haz click <a href="sobre.html">aquí</a> para saber sobre mí.</p>
    </div>
  </footer>

  <script>
    (function() {
      const form = document.getElementById('contact-form');
      const status = document.getElementById('form-status');

      if (!form) return;

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        status.style.display = "block";
        status.classList.remove('success', 'error');
        status.textContent = "⏳ Enviando...";

        const data = new FormData(form);

        try {
          const response = await fetch(form.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' },
            redirect: 'follow'
          });

          let body = null;
          try { body = await response.json(); } catch(e) {}

          if (response.ok) {
            form.style.display = "none";
            const introText = document.querySelector(".contacto-contenido p");
            if (introText) introText.style.display = "none";

            status.innerHTML = `
              <div class="success-message">
                <p>✅ ¡Tu mensaje fue enviado! Gracias por contactarte conmigo.</p>
                <button id="back-home-btn" class="back-home-btn">Volver al inicio</button>
              </div>
            `;
            status.classList.add('success');

            const backBtn = document.getElementById("back-home-btn");
            if (backBtn) {
              backBtn.addEventListener("click", () => {
                window.location.href = "index.html";
              });
            }

            form.reset();
          } else {
            const errorText = (body && (body.error || body.message)) ? (body.error || body.message) : "Ocurrió un error inesperado.";
            status.textContent = "❌ " + errorText;
            status.classList.add('error');
          }
        } catch (err) {
          status.textContent = "❌ No se pudo enviar. Revisá tu conexión a internet.";
          status.classList.add('error');
        }
      });
    })();
  </script>

  <script src="/scripts.js"></script>

</body>
</html>
